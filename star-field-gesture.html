<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手势控制星域粒子系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: system-ui, sans-serif; }
        #canvas { width: 100vw; height: 100vh; display: block; }
        #video {
            position: fixed; bottom: 20px; right: 20px;
            width: 200px; height: 150px; border-radius: 12px;
            border: 2px solid rgba(0, 220, 255, 0.25);
            object-fit: cover; transform: scaleX(-1);
            z-index: 10; opacity: 0.85;
        }
        #hud {
            position: fixed; top: 20px; left: 20px;
            color: rgba(255,255,255,0.7); z-index: 10;
            background: rgba(0,0,0,0.55); padding: 20px 24px;
            border-radius: 16px; border: 1px solid rgba(0,220,255,0.12);
            backdrop-filter: blur(10px); min-width: 220px;
        }
        #hud h1 { font-size: 18px; color: #00d4ff; margin-bottom: 16px; letter-spacing: 2px; }
        #hud .row { display: flex; justify-content: space-between; margin: 6px 0; font-size: 13px; }
        #hud .label { opacity: 0.5; }
        #hud .val { font-weight: 700; color: #00d4ff; font-size: 16px; font-variant-numeric: tabular-nums; }
        #hud .gesture-display {
            margin-top: 14px; padding-top: 14px;
            border-top: 1px solid rgba(255,255,255,0.06);
            font-size: 14px; text-align: center;
        }
        #hud .gesture-display .icon { font-size: 28px; display: block; margin-bottom: 6px; }
        #hud .gesture-display .text { color: #00d4ff; }
        #gesture-hint {
            position: fixed; bottom: 20px; left: 20px;
            color: rgba(255,255,255,0.35); font-size: 12px; z-index: 10;
            line-height: 1.8;
        }
        #gesture-hint span { color: rgba(0,220,255,0.6); }
        #loading-overlay {
            position: fixed; inset: 0; background: #000;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; z-index: 100;
            transition: opacity 0.6s;
        }
        #loading-overlay.hidden { opacity: 0; pointer-events: none; }
        #loading-overlay .spinner {
            width: 48px; height: 48px; border: 3px solid rgba(0,220,255,0.15);
            border-top-color: #00d4ff; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        #loading-overlay p { color: #00d4ff; margin-top: 16px; font-size: 14px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <video id="video" autoplay playsinline></video>

    <div id="hud">
        <h1>STAR FIELD</h1>
        <div class="row"><span class="label">镜头X</span><span class="val" id="hud-cx">0.0</span></div>
        <div class="row"><span class="label">镜头Y</span><span class="val" id="hud-cy">0.0</span></div>
        <div class="row"><span class="label">镜头Z</span><span class="val" id="hud-zoom">5.0</span></div>
        <div class="row"><span class="label">聚拢力</span><span class="val" id="hud-conv">0%</span></div>
        <div class="row"><span class="label">粒子数</span><span class="val" id="hud-count">30000</span></div>
        <div class="gesture-display">
            <span class="icon" id="gesture-icon">—</span>
            <span class="text" id="gesture-text">等待手势...</span>
        </div>
    </div>

    <div id="gesture-hint">
        <span>手靠近屏幕</span> → 视野拉近（手掌显大）<br>
        <span>手远离屏幕</span> → 视野拉远（手掌显小）<br>
        <span>移动手掌</span> → 视野跟随平移<br>
        <span>握拳</span> → 粒子向中心聚拢
    </div>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p>正在初始化手势识别与粒子引擎...</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <script>
    (() => {
        const N = 30000;
        const canvas = document.getElementById('canvas');
        const video = document.getElementById('video');
        const hudCx = document.getElementById('hud-cx');
        const hudCy = document.getElementById('hud-cy');
        const hudZoom = document.getElementById('hud-zoom');
        const hudConv = document.getElementById('hud-conv');
        const gestureIcon = document.getElementById('gesture-icon');
        const gestureText = document.getElementById('gesture-text');
        const loadingOverlay = document.getElementById('loading-overlay');

        let scene, camera, renderer, points;
        let pos, homePos, vel, col, sizes;
        let time = 0;

        let handData = null;
        let handFist = 0;
        let handPosX = 0.5, handPosY = 0.5;
        let handSize = 0.15;

        let curCameraZ = 5, targetCameraZ = 5;
        let curCamX = 0, targetCamX = 0;
        let curCamY = 0, targetCamY = 0;
        let curConverge = 0, targetConverge = 0;

        const CAMERA_Z_MIN = 1.5;
        const CAMERA_Z_MAX = 30.0;
        const PAN_RANGE = 6.0;
        const HAND_SIZE_MIN = 0.08;
        const HAND_SIZE_MAX = 1.0;

        function lerp(a, b, t) { return a + (b - a) * t; }
        function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
        function smoothstep(edge0, edge1, x) {
            const t = clamp((x - edge0) / (edge1 - edge0), 0, 1);
            return t * t * (3 - 2 * t);
        }

        function initRenderer() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 300);
            camera.position.set(0, 0, 5);

            renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
            renderer.setSize(innerWidth, innerHeight);
            renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
            renderer.setClearColor(0x000000, 1);
        }

        function initParticles() {
            const geo = new THREE.BufferGeometry();
            pos = new Float32Array(N * 3);
            homePos = new Float32Array(N * 3);
            vel = new Float32Array(N * 3);
            col = new Float32Array(N * 3);
            sizes = new Float32Array(N);

            for (let i = 0; i < N; i++) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = 2.0 + Math.random() * 12.0;

                const x = r * Math.sin(phi) * Math.cos(theta);
                const y = r * Math.sin(phi) * Math.sin(theta);
                const z = r * Math.cos(phi);

                const idx = i * 3;
                pos[idx] = x;
                pos[idx + 1] = y;
                pos[idx + 2] = z;
                homePos[idx] = x;
                homePos[idx + 1] = y;
                homePos[idx + 2] = z;
                vel[idx] = 0;
                vel[idx + 1] = 0;
                vel[idx + 2] = 0;

                const rand = Math.random();
                let hue, sat, light;
                if (rand < 0.35) {
                    hue = 0.48 + Math.random() * 0.07;
                    sat = 0.7 + Math.random() * 0.3;
                    light = 0.55 + Math.random() * 0.3;
                } else if (rand < 0.6) {
                    hue = 0.56 + Math.random() * 0.08;
                    sat = 0.6 + Math.random() * 0.3;
                    light = 0.5 + Math.random() * 0.3;
                } else if (rand < 0.78) {
                    hue = 0.62 + Math.random() * 0.06;
                    sat = 0.5 + Math.random() * 0.3;
                    light = 0.55 + Math.random() * 0.3;
                } else if (rand < 0.88) {
                    hue = 0.76 + Math.random() * 0.08;
                    sat = 0.6 + Math.random() * 0.3;
                    light = 0.5 + Math.random() * 0.3;
                } else if (rand < 0.95) {
                    hue = 0.0 + Math.random() * 0.02;
                    sat = 0.8 + Math.random() * 0.2;
                    light = 0.7 + Math.random() * 0.2;
                } else {
                    hue = 0.92 + Math.random() * 0.04;
                    sat = 0.7 + Math.random() * 0.3;
                    light = 0.6 + Math.random() * 0.2;
                }
                const c = new THREE.Color().setHSL(hue, sat, light);
                col[idx] = c.r;
                col[idx + 1] = c.g;
                col[idx + 2] = c.b;

                sizes[i] = 0.04 + Math.random() * 0.08;
                if (Math.random() < 0.03) sizes[i] = 0.14 + Math.random() * 0.08;
            }

            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
            geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

            const mat = new THREE.ShaderMaterial({
                uniforms: { time: { value: 0 } },
                vertexShader: `
                    attribute float size;
                    attribute vec3 color;
                    varying vec3 vColor;
                    varying float vDist;
                    uniform float time;
                    void main() {
                        vColor = color;
                        vec4 mv = modelViewMatrix * vec4(position, 1.0);
                        vDist = -mv.z;
                        gl_PointSize = size * 900.0 / max(-mv.z, 0.1);
                        gl_PointSize = clamp(gl_PointSize, 1.0, 50.0);
                        gl_Position = projectionMatrix * mv;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    varying float vDist;
                    void main() {
                        float d = length(gl_PointCoord - 0.5);
                        if (d > 0.5) discard;
                        float glow = exp(-d * 4.0);
                        float halo = exp(-d * 8.0) * 0.5;
                        float core = smoothstep(0.18, 0.0, d);
                        float brightness = clamp(1.0 / (1.0 + vDist * 0.03), 0.35, 1.0);
                        vec3 finalColor = vColor * (glow + halo) * brightness + vec3(0.9, 0.95, 1.0) * core * 0.7 * brightness;
                        float alpha = (glow + halo) * 0.85 + core * 0.4;
                        gl_FragColor = vec4(finalColor, alpha);
                    }
                `,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });

            points = new THREE.Points(geo, mat);
            scene.add(points);
        }

        function getFistRatio(lm) {
            if (!lm || lm.length < 21) return 0;
            const tips = [4, 8, 12, 16, 20];
            const pips = [3, 6, 10, 14, 18];
            let closed = 0;
            for (let i = 1; i < 5; i++) {
                if (lm[tips[i]].y > lm[pips[i]].y) closed++;
            }
            const thumbClosed = Math.abs(lm[tips[0]].x - lm[pips[0]].x) < 0.04 ? 1 : 0;
            closed += thumbClosed;
            return closed / 5;
        }

        async function setupHands() {
            const hands = new Hands({
                locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
            });
            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.5
            });

            hands.onResults(results => {
                handData = null;
                handFist = 0;

                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    handData = results.multiHandLandmarks[0];
                    handFist = getFistRatio(handData);
                    handPosX = handData[9].x;
                    handPosY = handData[9].y;
                    const dx = handData[9].x - handData[0].x;
                    const dy = handData[9].y - handData[0].y;
                    handSize = Math.sqrt(dx * dx + dy * dy);
                }
                updateGestureTargets();
            });

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 640, height: 480, facingMode: 'user' }
                });
                video.srcObject = stream;
                new Camera(video, {
                    onFrame: async () => { await hands.send({ image: video }); },
                    width: 640,
                    height: 480
                }).start();
            } catch (e) {
                console.warn('Camera access denied:', e);
                gestureText.textContent = '摄像头未授权';
            }
        }

        function updateGestureTargets() {
            if (handData) {
                targetCamX = (handPosX - 0.5) * PAN_RANGE;
                targetCamY = (handPosY - 0.5) * PAN_RANGE;
                const normSize = clamp((handSize - HAND_SIZE_MIN) / (HAND_SIZE_MAX - HAND_SIZE_MIN), 0, 1);
                targetCameraZ = lerp(CAMERA_Z_MIN, CAMERA_Z_MAX, normSize);
                targetConverge = smoothstep(0.35, 0.85, handFist);
                targetCameraZ += targetConverge * 15;
            } else {
                targetCamX = 0;
                targetCamY = 0;
                targetCameraZ = 5;
                targetConverge = 0;
            }
        }

        function updateHUD() {
            hudCx.textContent = curCamX.toFixed(1);
            hudCy.textContent = curCamY.toFixed(1);
            hudZoom.textContent = curCameraZ.toFixed(1);
            hudConv.textContent = Math.round(curConverge * 100) + '%';

            if (handData) {
                if (curConverge > 0.4) {
                    gestureIcon.textContent = '✊';
                    gestureText.textContent = '握拳 · 粒子聚拢';
                } else {
                    gestureIcon.textContent = '🖐';
                    gestureText.textContent = '张开手掌 · 粒子散开';
                }
            } else {
                gestureIcon.textContent = '👀';
                gestureText.textContent = '等待手势...';
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;

            curCameraZ = lerp(curCameraZ, targetCameraZ, 0.045);
            curCamX = lerp(curCamX, targetCamX, 0.04);
            curCamY = lerp(curCamY, targetCamY, 0.04);
            curConverge = lerp(curConverge, targetConverge, 0.06);

            camera.position.set(curCamX, curCamY, curCameraZ);

            const convergeRadius = 2.0;
            const convergeStrength = curConverge * 0.015;
            const homeStrength = 0.004 * (1.0 - curConverge * 0.7);
            const driftSpeed = 0.0003;

            for (let i = 0; i < N; i++) {
                const idx = i * 3;
                let x = pos[idx], y = pos[idx + 1], z = pos[idx + 2];
                const hx = homePos[idx], hy = homePos[idx + 1], hz = homePos[idx + 2];

                const dist = Math.sqrt(x * x + y * y + z * z);

                vel[idx] += (hx - x) * homeStrength;
                vel[idx + 1] += (hy - y) * homeStrength;
                vel[idx + 2] += (hz - z) * homeStrength;

                if (curConverge > 0.01 && dist > convergeRadius) {
                    const factor = convergeStrength * (1.0 - convergeRadius / (dist + 0.001));
                    vel[idx] -= (x / (dist + 0.001)) * factor;
                    vel[idx + 1] -= (y / (dist + 0.001)) * factor;
                    vel[idx + 2] -= (z / (dist + 0.001)) * factor;
                }

                const angle = time * driftSpeed + i * 0.0001;
                vel[idx] += Math.sin(angle + y * 0.5) * 0.00015;
                vel[idx + 1] += Math.cos(angle + x * 0.5) * 0.00015;
                vel[idx + 2] += Math.sin(angle + z * 0.3) * 0.0001;

                vel[idx] *= 0.97;
                vel[idx + 1] *= 0.97;
                vel[idx + 2] *= 0.97;

                pos[idx] += vel[idx];
                pos[idx + 1] += vel[idx + 1];
                pos[idx + 2] += vel[idx + 2];
            }

            points.geometry.attributes.position.needsUpdate = true;
            points.material.uniforms.time.value = time;

            points.rotation.y += 0.0004;
            points.rotation.x += 0.0001;

            renderer.render(scene, camera);
            updateHUD();
        }

        function onResize() {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        }

        async function main() {
            initRenderer();
            initParticles();
            window.addEventListener('resize', onResize);
            await setupHands();
            loadingOverlay.classList.add('hidden');
            animate();
        }

        main();
    })();
    </script>
</body>
</html>
